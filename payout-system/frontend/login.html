<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    body { font-family: 'Tajawal', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; }
    .card { border: none; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .btn-primary { background: #1a6b4a; border-color: #1a6b4a; border-radius: 12px; padding: 12px; font-weight: 500; }
    .btn-primary:hover { background: #155a3e; border-color: #155a3e; }
    .btn-primary:disabled { background: #6c9e85; border-color: #6c9e85; }
    .form-control, .form-select { border-radius: 10px; padding: 12px 16px; border: 1.5px solid #e2e8f0; font-family: 'Tajawal', sans-serif; }
    .form-control:focus { border-color: #1a6b4a; box-shadow: 0 0 0 3px rgba(26,107,74,0.12); }
    .logo-circle { width: 72px; height: 72px; background: linear-gradient(135deg,#1a6b4a,#2d9e6e); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .toast-container { position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 9999; min-width: 320px; }
    .badge-status { padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <!-- Toast -->
  <div class="toast-container">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body fw-500" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <div class="container" style="max-width:460px;">
    <div class="card p-4 p-md-5" x-data="loginPage()">
      <div class="logo-circle">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h4 class="text-center fw-700 mb-1">مرحباً بك</h4>
      <p class="text-center text-muted mb-4">سجّل دخولك للمتابعة</p>

      <form @submit.prevent="submit">
        <div class="mb-3">
          <label class="form-label fw-500">البريد الإلكتروني</label>
          <input type="email" class="form-control" x-model="form.email" placeholder="example@email.com" required autocomplete="email">
        </div>
        <div class="mb-4 position-relative">
          <label class="form-label fw-500">كلمة المرور</label>
          <input :type="showPass ? 'text' : 'password'" class="form-control pe-5" x-model="form.password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="btn btn-sm position-absolute top-50 start-0 translate-middle-y ps-3 border-0 bg-transparent text-muted" style="top:38px!important;transform:none!important;margin-top:32px" @click="showPass=!showPass">
            <span x-text="showPass ? '🙈' : '👁'"></span>
          </button>
        </div>
        <template x-if="error">
          <div class="alert alert-danger rounded-3 py-2 mb-3 text-sm" x-text="error"></div>
        </template>
        <button type="submit" class="btn btn-primary w-100" :disabled="_submitting">
          <span x-show="!_submitting">تسجيل الدخول</span>
          <span x-show="_submitting">
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>جارٍ التحقق...
          </span>
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        ليس لديك حساب؟
        <a href="register.html" class="text-decoration-none fw-500" style="color:#1a6b4a;">إنشاء حساب جديد</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    function showToast(msg, type='success') {
      const el = document.getElementById('toast');
      const msgEl = document.getElementById('toastMsg');
      msgEl.textContent = msg;
      el.className = `toast align-items-center text-white border-0 bg-${type === 'success' ? 'success' : 'danger'}`;
      bootstrap.Toast.getOrCreateInstance(el, { delay: 4000 }).show();
    }

    function loginPage() {
      return {
        form: { email: '', password: '' },
        showPass: false,
        error: '',
        _submitting: false,

        async submit() {
          this.error = '';
          this._submitting = true;
          try {
            const res = await API.auth.login(this.form);
            localStorage.setItem('access_token',  res.access_token  || res.accessToken  || '');
            localStorage.setItem('refresh_token', res.refresh_token || res.refreshToken || '');
            localStorage.setItem('user', JSON.stringify(res.user || res));
            const role = (res.user?.role || res.role || '').toUpperCase();
            showToast('تم تسجيل الدخول بنجاح');
            setTimeout(() => {
              if (role === 'CUSTOMER') location.href = 'checkout.html';
              else location.href = 'provider-dashboard.html';
            }, 600);
          } catch (e) {
            this.error = e.message || 'بيانات غير صحيحة. يرجى المحاولة مجدداً.';
          } finally {
            this._submitting = false;
          }
        },
      };
    }
  </script>
</body>
</html>
