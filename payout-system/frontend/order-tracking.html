<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تتبع الطلب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    body { font-family: 'Tajawal', sans-serif; background: #f0f4f8; padding: 2rem 0; }
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .btn-primary { background: #1a6b4a; border-color: #1a6b4a; border-radius: 12px; padding: 14px; font-weight: 500; }
    .btn-primary:hover { background: #155a3e; border-color: #155a3e; }
    .btn-primary:disabled { background: #6c9e85; border-color: #6c9e85; }
    .badge-status { padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }

    /* Timeline */
    .timeline { position: relative; padding-right: 0; }
    .timeline-item { display: flex; gap: 20px; margin-bottom: 0; position: relative; }
    .timeline-item:last-child .timeline-connector { display: none; }
    .timeline-icon-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .timeline-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; z-index: 1; }
    .timeline-icon.done { background: #d1fae5; }
    .timeline-icon.active { background: #fef3c7; box-shadow: 0 0 0 4px rgba(245,158,11,0.15); animation: pulse 2s infinite; }
    .timeline-icon.pending { background: #f1f5f9; }
    .timeline-connector { width: 2px; height: 48px; background: #e2e8f0; margin: 4px auto; }
    .timeline-connector.done { background: #1a6b4a; }
    .timeline-content { flex: 1; padding-bottom: 28px; }
    .timeline-content.active .step-label { font-weight: 700; color: #92400e; }
    .timeline-content.done .step-label { color: #1a6b4a; }
    .timeline-content.pending .step-label { color: #94a3b8; }

    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px rgba(245,158,11,0.15); } 50% { box-shadow: 0 0 0 8px rgba(245,158,11,0.08); } }

    .release-btn { background: linear-gradient(135deg,#1a6b4a,#2d9e6e); border: none; border-radius: 14px; padding: 18px; font-size: 1.1rem; font-weight: 700; color: #fff; width: 100%; cursor: pointer; transition: transform 0.15s,box-shadow 0.15s; }
    .release-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,107,74,0.3); }
    .release-btn:disabled { background: #94a3b8; transform: none; box-shadow: none; }
    .financial-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    .financial-row:last-child { border-bottom: none; }
    .toast-container { position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 9999; min-width: 320px; }
    .refresh-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #94a3b8; }
    .spinner-border-sm { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="toast-container">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-500" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Release confirmation modal -->
  <div class="modal fade" id="releaseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 rounded-4">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-700">تأكيد الإفراج عن الدفعة</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body py-3">
          <div class="text-center mb-3">
            <div style="width:64px;height:64px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.8rem;">✅</div>
          </div>
          <p class="text-muted mb-2">هل أنت متأكد من الإفراج عن الدفعة؟</p>
          <div class="alert alert-warning rounded-3 py-2" style="font-size:0.88rem;">
            ⚠️ سيتم تحويل المبلغ للمزود فور الضغط على تأكيد. هذا الإجراء لا يمكن التراجع عنه.
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-outline-secondary rounded-3 px-4" data-bs-dismiss="modal">إلغاء</button>
          <button type="button" class="btn btn-primary rounded-3 px-4" id="confirmReleaseBtn">تأكيد الإفراج</button>
        </div>
      </div>
    </div>
  </div>

  <div class="container" style="max-width:720px;" x-data="trackingPage()">
    <!-- Header -->
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="checkout.html" class="btn btn-sm btn-outline-secondary rounded-circle" style="width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </a>
      <div>
        <h5 class="fw-700 mb-0">تتبع الطلب</h5>
        <div class="refresh-badge">
          <span x-show="loading"><span class="spinner-border spinner-border-sm"></span></span>
          <span x-text="'رقم الطلب: ' + escHtml(orderId)"></span>
        </div>
      </div>
      <div class="ms-auto">
        <span class="badge badge-status" :class="statusBadgeClass" x-text="statusLabel"></span>
      </div>
    </div>

    <!-- Loading skeleton -->
    <template x-if="loading && !order">
      <div class="card p-4 text-center">
        <div class="spinner-border text-success mx-auto mb-3"></div>
        <p class="text-muted mb-0">جارٍ تحميل بيانات الطلب...</p>
      </div>
    </template>

    <!-- Error state -->
    <template x-if="loadError">
      <div class="card p-4 text-center">
        <div style="font-size:2.5rem;margin-bottom:1rem;">❌</div>
        <h6 class="fw-700">تعذّر تحميل الطلب</h6>
        <p class="text-muted" x-text="loadError"></p>
        <button class="btn btn-primary px-4" @click="fetchOrder()">إعادة المحاولة</button>
      </div>
    </template>

    <!-- Main content -->
    <template x-if="order">
      <div>
        <!-- Released success banner -->
        <template x-if="order.status === 'RELEASED'">
          <div class="alert border-0 rounded-4 mb-4 d-flex align-items-center gap-3" style="background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#065f46;">
            <span style="font-size:2rem;">🎉</span>
            <div>
              <div class="fw-700 mb-1">تم الإفراج عن الدفعة بنجاح!</div>
              <div style="font-size:0.9rem;">شكراً لاستخدامك منصتنا. تم تحويل المبلغ للمزود.</div>
            </div>
          </div>
        </template>

        <!-- Timeline -->
        <div class="card p-4 mb-4">
          <h6 class="fw-700 mb-4">مراحل الطلب</h6>
          <div class="timeline">
            <template x-for="(step, i) in steps" :key="i">
              <div class="timeline-item">
                <div class="timeline-icon-wrap">
                  <div class="timeline-icon" :class="step.state">
                    <span x-text="step.icon"></span>
                  </div>
                  <div class="timeline-connector" :class="step.state === 'done' ? 'done' : ''"></div>
                </div>
                <div class="timeline-content" :class="step.state">
                  <div class="step-label fw-600" x-text="step.label"></div>
                  <div class="text-muted" style="font-size:0.82rem;" x-text="step.ts || (step.state === 'pending' ? 'في الانتظار' : '')"></div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Financial summary -->
        <div class="card p-4 mb-4">
          <h6 class="fw-700 mb-3">الملخص المالي</h6>
          <div class="financial-row">
            <span class="text-muted">المبلغ الإجمالي</span>
            <span class="fw-600" x-text="fmt(order.totalAmount) + ' ريال'"></span>
          </div>
          <div class="financial-row">
            <span class="text-muted">ضريبة القيمة المضافة (15%)</span>
            <span class="fw-500" x-text="fmt(order.totalAmount / 1.15 * 0.15) + ' ريال'"></span>
          </div>
          <div class="financial-row">
            <span class="text-muted">عمولة المنصة (15%)</span>
            <span class="fw-500" x-text="fmt(order.serviceAmount * 0.15) + ' ريال'"></span>
          </div>
          <div class="financial-row">
            <span class="fw-600">صافي المزود</span>
            <span class="fw-700" style="color:#1a6b4a;" x-text="fmt(order.serviceAmount * 0.85) + ' ريال'"></span>
          </div>
          <template x-if="order.materialsAmount > 0">
            <div class="financial-row">
              <span class="text-muted">ميزانية المواد</span>
              <span class="fw-500" x-text="fmt(order.materialsAmount) + ' ريال'"></span>
            </div>
          </template>
        </div>

        <!-- Action area -->
        <template x-if="order.status === 'AWAITING_RELEASE'">
          <div class="card p-4 mb-4" style="border: 2px solid #1a6b4a;">
            <div class="text-center mb-3">
              <div class="fw-700 mb-1">هل اكتملت الخدمة بشكل مرضٍ؟</div>
              <div class="text-muted" style="font-size:0.9rem;">بالضغط على الزر أدناه تؤكد رضاك وتوافق على تحويل المبلغ للمزود.</div>
            </div>
            <button class="release-btn" @click="openReleaseModal" :disabled="_releasing">
              <span x-show="!_releasing">✅ الإفراج عن الدفعة وتأكيد الاكتمال</span>
              <span x-show="_releasing">
                <span class="spinner-border spinner-border-sm me-2"></span>جارٍ الإفراج...
              </span>
            </button>
            <p class="text-center text-muted mt-2 mb-0" style="font-size:0.78rem;">
              سيتم الإفراج التلقائي خلال 48 ساعة إذا لم يتم رفع نزاع
            </p>
          </div>
        </template>

        <!-- Auto-refresh note -->
        <template x-if="order.status !== 'RELEASED'">
          <div class="text-center text-muted mb-3" style="font-size:0.82rem;">
            🔄 يتم تحديث الصفحة تلقائياً كل 30 ثانية
          </div>
        </template>
      </div>
    </template>
  </div>

  <script src="js/api.js"></script>
  <script>
    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      const msgEl = document.getElementById('toastMsg');
      msgEl.textContent = msg;
      el.className = `toast align-items-center text-white border-0 bg-${type === 'success' ? 'success' : 'danger'}`;
      bootstrap.Toast.getOrCreateInstance(el, { delay: 4000 }).show();
    }

    function trackingPage() {
      return {
        orderId: '',
        order: null,
        loading: true,
        loadError: '',
        _releasing: false,
        _timer: null,

        get statusLabel() {
          const map = {
            CREATED: 'تم الإنشاء', ACCEPTED: 'مقبول', IN_PROGRESS: 'جارٍ التنفيذ',
            COMPLETED: 'مكتمل', AWAITING_RELEASE: 'في انتظار الإفراج',
            RELEASED: 'تم الإفراج', CANCELLED: 'ملغي',
          };
          return map[this.order?.status] || this.order?.status || '';
        },

        get statusBadgeClass() {
          const map = {
            CREATED: 'bg-secondary text-white', ACCEPTED: 'bg-primary text-white',
            IN_PROGRESS: 'bg-warning text-dark', COMPLETED: 'bg-success text-white',
            AWAITING_RELEASE: 'bg-success text-white', RELEASED: 'bg-dark text-white',
            CANCELLED: 'bg-danger text-white',
          };
          return map[this.order?.status] || 'bg-secondary text-white';
        },

        get steps() {
          const s = this.order?.status;
          const ts = this.order?.statusTimestamps || {};
          const order = [
            'CREATED','ACCEPTED','IN_PROGRESS','AWAITING_RELEASE','RELEASED',
          ];
          const labels = {
            CREATED: 'تم إنشاء الطلب', ACCEPTED: 'قبل المزود الطلب',
            IN_PROGRESS: 'جارٍ تنفيذ العمل', AWAITING_RELEASE: 'اكتمل العمل',
            RELEASED: 'تم الإفراج عن الدفعة',
          };
          const icons = { CREATED:'📝', ACCEPTED:'✅', IN_PROGRESS:'🔄', AWAITING_RELEASE:'🏁', RELEASED:'💚' };
          const currentIdx = order.indexOf(s);

          return order.map((step, i) => ({
            label: labels[step],
            icon:  icons[step],
            state: i < currentIdx ? 'done' : i === currentIdx ? 'active' : 'pending',
            ts: ts[step] ? new Date(ts[step]).toLocaleString('ar-SA') : '',
          }));
        },

        fmt(n) {
          return Number(n || 0).toLocaleString('ar-SA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        },

        async fetchOrder() {
          if (!this.orderId) return;
          this.loading = true;
          this.loadError = '';
          try {
            const data = await API.orders.get(this.orderId);
            this.order = data;
            if (data.status !== 'RELEASED') {
              this._timer = setTimeout(() => this.fetchOrder(), 30000);
            }
          } catch (e) {
            this.loadError = e.message || 'تعذّر تحميل بيانات الطلب';
          } finally {
            this.loading = false;
          }
        },

        openReleaseModal() {
          const modal = new bootstrap.Modal(document.getElementById('releaseModal'));
          modal.show();
          document.getElementById('confirmReleaseBtn').onclick = () => {
            modal.hide();
            this.releasePayment();
          };
        },

        async releasePayment() {
          this._releasing = true;
          try {
            await API.orders.release(this.orderId);
            showToast('تم الإفراج عن الدفعة بنجاح! ✅');
            await this.fetchOrder();
          } catch (e) {
            showToast(e.message || 'حدث خطأ أثناء الإفراج عن الدفعة', 'error');
          } finally {
            this._releasing = false;
          }
        },

        init() {
          const params = new URLSearchParams(location.search);
          this.orderId = params.get('orderId') || 'demo-001';
          this.fetchOrder();
        },

        destroy() {
          if (this._timer) clearTimeout(this._timer);
        },
      };
    }
  </script>
</body>
</html>
