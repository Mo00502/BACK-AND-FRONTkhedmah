<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    body { font-family: 'Tajawal', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 2rem 0; }
    .card { border: none; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .btn-primary { background: #1a6b4a; border-color: #1a6b4a; border-radius: 12px; padding: 12px; font-weight: 500; }
    .btn-primary:hover { background: #155a3e; border-color: #155a3e; }
    .btn-primary:disabled { background: #6c9e85; border-color: #6c9e85; }
    .btn-outline-primary { border-color: #1a6b4a; color: #1a6b4a; border-radius: 12px; }
    .btn-outline-primary:hover { background: #1a6b4a; color: #fff; }
    .form-control, .form-select { border-radius: 10px; padding: 12px 16px; border: 1.5px solid #e2e8f0; font-family: 'Tajawal', sans-serif; }
    .form-control:focus, .form-select:focus { border-color: #1a6b4a; box-shadow: 0 0 0 3px rgba(26,107,74,0.12); }
    .role-card { cursor: pointer; border: 2.5px solid #e2e8f0; border-radius: 16px; padding: 28px 20px; text-align: center; transition: all 0.2s; background: #fff; }
    .role-card:hover { border-color: #1a6b4a; background: #f0faf4; }
    .role-card.selected { border-color: #1a6b4a; background: #f0faf4; box-shadow: 0 0 0 3px rgba(26,107,74,0.12); }
    .role-icon { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.8rem; }
    .step-indicator { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 2rem; }
    .step-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; transition: all 0.2s; }
    .step-dot.active { background: #1a6b4a; color: #fff; }
    .step-dot.done { background: #d1fae5; color: #1a6b4a; }
    .step-dot.pending { background: #e2e8f0; color: #94a3b8; }
    .step-line { flex: 1; height: 2px; background: #e2e8f0; max-width: 80px; }
    .step-line.done { background: #1a6b4a; }
    .toast-container { position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 9999; min-width: 320px; }
    .badge-status { padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="toast-container">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-500" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <div class="container" style="max-width:560px;" x-data="registerPage()">
    <div class="card p-4 p-md-5">
      <!-- Header -->
      <div class="text-center mb-4">
        <div style="width:56px;height:56px;background:linear-gradient(135deg,#1a6b4a,#2d9e6e);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h4 class="fw-700 mb-1">إنشاء حساب جديد</h4>
        <p class="text-muted">انضم إلى منصة المدفوعات</p>
      </div>

      <!-- Step indicator -->
      <div class="step-indicator">
        <div class="step-dot" :class="step >= 1 ? (step > 1 ? 'done' : 'active') : 'pending'">
          <span x-show="step > 1">✓</span>
          <span x-show="step <= 1">١</span>
        </div>
        <div class="step-line" :class="step > 1 ? 'done' : ''"></div>
        <div class="step-dot" :class="step >= 2 ? 'active' : 'pending'">٢</div>
      </div>

      <!-- Step 1: Role selection -->
      <div x-show="step === 1">
        <h6 class="fw-600 mb-3 text-center">اختر نوع الحساب</h6>
        <div class="row g-3">
          <div class="col-6">
            <div class="role-card" :class="form.role === 'CUSTOMER' ? 'selected' : ''" @click="form.role = 'CUSTOMER'">
              <div class="role-icon" style="background:#eff6ff;">🛒</div>
              <div class="fw-700 mb-1">عميل</div>
              <div class="text-muted" style="font-size:0.85rem;">أطلب خدمات واحصل عليها</div>
            </div>
          </div>
          <div class="col-6">
            <div class="role-card" :class="form.role === 'PROVIDER' ? 'selected' : ''" @click="form.role = 'PROVIDER'">
              <div class="role-icon" style="background:#f0fdf4;">🔧</div>
              <div class="fw-700 mb-1">مزود خدمة</div>
              <div class="text-muted" style="font-size:0.85rem;">قدّم خدماتك واكسب</div>
            </div>
          </div>
        </div>
        <template x-if="errors.role">
          <p class="text-danger mt-2 mb-0" style="font-size:0.85rem;" x-text="errors.role"></p>
        </template>
        <button class="btn btn-primary w-100 mt-4" @click="nextStep">
          متابعة
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ms-1">
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </button>
      </div>

      <!-- Step 2: Full form -->
      <div x-show="step === 2">
        <div class="d-flex align-items-center gap-2 mb-4">
          <button class="btn btn-sm btn-outline-secondary rounded-circle" @click="step=1" style="width:32px;height:32px;padding:0;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <span class="text-muted" style="font-size:0.9rem;">
            <span x-text="form.role === 'CUSTOMER' ? 'حساب عميل' : 'حساب مزود خدمة'"></span>
          </span>
        </div>

        <form @submit.prevent="submit">
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label fw-500">الاسم الأول</label>
              <input type="text" class="form-control" x-model="form.firstName" placeholder="محمد" required>
              <template x-if="errors.firstName">
                <p class="text-danger mt-1 mb-0" style="font-size:0.8rem;" x-text="errors.firstName"></p>
              </template>
            </div>
            <div class="col-6">
              <label class="form-label fw-500">اسم العائلة</label>
              <input type="text" class="form-control" x-model="form.lastName" placeholder="الأحمد" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-500">البريد الإلكتروني</label>
            <input type="email" class="form-control" x-model="form.email" placeholder="example@email.com" required autocomplete="email">
            <template x-if="errors.email">
              <p class="text-danger mt-1 mb-0" style="font-size:0.8rem;" x-text="errors.email"></p>
            </template>
          </div>

          <div class="mb-3">
            <label class="form-label fw-500">رقم الجوال <span class="text-muted">(اختياري)</span></label>
            <input type="tel" class="form-control" x-model="form.phone" placeholder="05xxxxxxxx" dir="ltr">
          </div>

          <div class="mb-3">
            <label class="form-label fw-500">كلمة المرور</label>
            <input type="password" class="form-control" x-model="form.password" placeholder="••••••••" required autocomplete="new-password" @input="checkPass">
            <template x-if="errors.password">
              <p class="text-danger mt-1 mb-0" style="font-size:0.8rem;" x-text="errors.password"></p>
            </template>
          </div>

          <div class="mb-3">
            <label class="form-label fw-500">تأكيد كلمة المرور</label>
            <input type="password" class="form-control" x-model="form.confirmPassword" placeholder="••••••••" required autocomplete="new-password">
            <template x-if="errors.confirmPassword">
              <p class="text-danger mt-1 mb-0" style="font-size:0.8rem;" x-text="errors.confirmPassword"></p>
            </template>
          </div>

          <!-- Provider-only fields -->
          <template x-if="form.role === 'PROVIDER'">
            <div>
              <hr class="my-3">
              <p class="fw-600 text-muted mb-3" style="font-size:0.9rem;">معلومات الحساب البنكي</p>
              <div class="mb-3">
                <label class="form-label fw-500">اسم البنك</label>
                <select class="form-select" x-model="form.bankName" required>
                  <option value="">-- اختر البنك --</option>
                  <option value="الأهلي">البنك الأهلي السعودي</option>
                  <option value="الراجحي">مصرف الراجحي</option>
                  <option value="الرياض">بنك الرياض</option>
                  <option value="العربي الوطني">البنك العربي الوطني</option>
                  <option value="سامبا">بنك سامبا</option>
                  <option value="البلاد">بنك البلاد</option>
                  <option value="الإنماء">بنك الإنماء</option>
                  <option value="الجزيرة">بنك الجزيرة</option>
                </select>
                <template x-if="errors.bankName">
                  <p class="text-danger mt-1 mb-0" style="font-size:0.8rem;" x-text="errors.bankName"></p>
                </template>
              </div>
              <div class="mb-3">
                <label class="form-label fw-500">رقم الآيبان</label>
                <input type="text" class="form-control" x-model="form.iban" placeholder="SA0000000000000000000000"
                  dir="ltr" maxlength="24" @input="validateIban" required>
                <div class="d-flex align-items-center gap-2 mt-1">
                  <template x-if="form.iban.length === 24 && ibanValid">
                    <span class="text-success" style="font-size:0.85rem;">✓ رقم آيبان صالح</span>
                  </template>
                  <template x-if="form.iban.length > 0 && !ibanValid">
                    <span class="text-danger" style="font-size:0.85rem;">✗ رقم الآيبان غير صحيح</span>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <template x-if="generalError">
            <div class="alert alert-danger rounded-3 py-2 mb-3" x-text="generalError"></div>
          </template>

          <button type="submit" class="btn btn-primary w-100 mt-2" :disabled="_submitting">
            <span x-show="!_submitting">إنشاء الحساب</span>
            <span x-show="_submitting">
              <span class="spinner-border spinner-border-sm me-2" role="status"></span>جارٍ الإنشاء...
            </span>
          </button>
        </form>
      </div>

      <hr class="mt-4 mb-3">
      <p class="text-center text-muted mb-0" style="font-size:0.9rem;">
        لديك حساب بالفعل؟
        <a href="login.html" class="text-decoration-none fw-500" style="color:#1a6b4a;">تسجيل الدخول</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      const msgEl = document.getElementById('toastMsg');
      msgEl.textContent = msg;
      el.className = `toast align-items-center text-white border-0 bg-${type === 'success' ? 'success' : 'danger'}`;
      bootstrap.Toast.getOrCreateInstance(el, { delay: 4000 }).show();
    }

    function registerPage() {
      return {
        step: 1,
        ibanValid: false,
        _submitting: false,
        generalError: '',
        errors: {},
        form: {
          role: '',
          firstName: '',
          lastName: '',
          email: '',
          phone: '',
          password: '',
          confirmPassword: '',
          bankName: '',
          iban: '',
        },

        validateIban() {
          const v = this.form.iban.trim().toUpperCase();
          this.form.iban = v;
          this.ibanValid = /^SA\d{22}$/.test(v);
        },

        checkPass() {
          if (this.form.password.length > 0 && this.form.password.length < 8) {
            this.errors.password = 'كلمة المرور يجب أن تكون 8 أحرف على الأقل';
          } else {
            this.errors.password = '';
          }
        },

        nextStep() {
          this.errors = {};
          if (!this.form.role) { this.errors.role = 'يرجى اختيار نوع الحساب'; return; }
          this.step = 2;
        },

        validate() {
          this.errors = {};
          let ok = true;
          if (!this.form.firstName.trim()) { this.errors.firstName = 'الاسم الأول مطلوب'; ok = false; }
          if (!this.form.email.trim()) { this.errors.email = 'البريد الإلكتروني مطلوب'; ok = false; }
          if (this.form.password.length < 8) { this.errors.password = 'كلمة المرور قصيرة جداً'; ok = false; }
          if (this.form.password !== this.form.confirmPassword) { this.errors.confirmPassword = 'كلمتا المرور غير متطابقتين'; ok = false; }
          if (this.form.role === 'PROVIDER') {
            if (!this.form.bankName) { this.errors.bankName = 'اسم البنك مطلوب'; ok = false; }
            if (!this.ibanValid) { this.errors.iban = 'رقم الآيبان غير صحيح'; ok = false; }
          }
          return ok;
        },

        async submit() {
          if (!this.validate()) return;
          this.generalError = '';
          this._submitting = true;
          try {
            const payload = {
              firstName: this.form.firstName.trim(),
              lastName: this.form.lastName.trim(),
              email: this.form.email.trim(),
              password: this.form.password,
              role: this.form.role,
              ...(this.form.phone ? { phone: this.form.phone.trim() } : {}),
              ...(this.form.role === 'PROVIDER' ? {
                bankName: this.form.bankName,
                iban: this.form.iban,
              } : {}),
            };
            await API.auth.register(payload);
            showToast('تم إنشاء الحساب بنجاح! يرجى تسجيل الدخول.');
            setTimeout(() => location.href = 'login.html', 1800);
          } catch (e) {
            this.generalError = e.message || 'حدث خطأ أثناء إنشاء الحساب. يرجى المحاولة مجدداً.';
          } finally {
            this._submitting = false;
          }
        },
      };
    }
  </script>
</body>
</html>
