name: CI — Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/khedmah-api

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Lint + Unit Tests
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     khedmah_test
          POSTGRES_PASSWORD: khedmah_test
          POSTGRES_DB:       khedmah_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations (test DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://khedmah_test:khedmah_test@localhost:5432/khedmah_test

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --ci --coverage --passWithNoTests
        env:
          NODE_ENV:     test
          DATABASE_URL: postgresql://khedmah_test:khedmah_test@localhost:5432/khedmah_test
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   ci-test-jwt-secret-minimum-32-chars!!
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32!!
          MOYASAR_API_KEY:    test_sk_ci
          MOYASAR_WEBHOOK_SECRET: ci-webhook-secret

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — E2E Tests (only on PRs to main)
  # ═══════════════════════════════════════════════════════════════════════════
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     khedmah_e2e
          POSTGRES_PASSWORD: khedmah_e2e
          POSTGRES_DB:       khedmah_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://khedmah_e2e:khedmah_e2e@localhost:5432/khedmah_e2e

      - name: E2E tests
        run: npm run test:e2e -- --ci
        env:
          NODE_ENV:     test
          DATABASE_URL: postgresql://khedmah_e2e:khedmah_e2e@localhost:5432/khedmah_e2e
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   ci-test-jwt-secret-minimum-32-chars!!
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32!!
          MOYASAR_API_KEY:    test_sk_ci
          MOYASAR_WEBHOOK_SECRET: ci-webhook-secret

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Build TypeScript (catch compile errors)
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — Docker Build & Push (only on push to main)
  # ═══════════════════════════════════════════════════════════════════════════
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       ./Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 5 — Deploy (triggered after Docker push, main branch only)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production       # requires manual approval in GitHub Environments

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/khedmah
            # 1. Pre-deploy DB backup (fail loudly if backup fails)
            bash docker/backup.sh || { echo "BACKUP FAILED — aborting deploy"; exit 1; }

            # 2. Pull latest image
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}/khedmah-api:latest

            # 3. Run Prisma migrations (with backup already done)
            docker compose run --rm migrate

            # 4. Zero-downtime swap: scale up new, wait for health, scale down old
            docker compose up -d --no-deps --scale api=2 api
            sleep 20
            # Wait for health check to pass on new container
            for i in $(seq 1 6); do
              STATUS=$(docker compose ps --format json api | python3 -c "import sys,json; d=[json.loads(l) for l in sys.stdin if l.strip()]; print(d[0].get('Health','') if d else 'unknown')" 2>/dev/null || echo "unknown")
              [[ "$STATUS" == "healthy" ]] && break
              echo "Waiting for health check ($i/6)..."; sleep 5
            done
            docker compose up -d --no-deps --scale api=1 api

            # 5. Prune old images
            docker image prune -f

            echo "✅ Deploy complete — commit ${{ github.sha }}"

      - name: Smoke test — verify /health endpoint
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sleep 5
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/api/v1/health/live)
            [[ "$STATUS" == "200" ]] || { echo "Health check failed: HTTP $STATUS"; exit 1; }
            echo "✅ Health check passed (HTTP $STATUS)"

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1
        continue-on-error: true
        with:
          payload: |
            {
              "text": "✅ Khedmah deployed successfully — <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}> by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        continue-on-error: true
        with:
          payload: |
            {
              "text": "❌ Khedmah deploy FAILED — <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}> by ${{ github.actor }} — <https://github.com/${{ github.repository }}/actions|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
