# ── Upstream with keepalive connection pool ───────────────────────────────────
upstream khedmah_api {
  server api:3000;
  keepalive 32;
}

# ── Rate limiting zones (shared memory, survives worker restarts) ─────────────
limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=10r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
  listen 80;
  server_name api.khedmah.sa;
  return 301 https://$host$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name api.khedmah.sa;

  # ── TLS ────────────────────────────────────────────────────────────────────
  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  # Modern cipher suite — removes CBC, RC4, 3DES
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off; # TLS 1.3 negotiates this itself
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off; # forward secrecy

  # ── Security headers ────────────────────────────────────────────────────────
  add_header X-Frame-Options          "DENY"                              always;
  add_header X-Content-Type-Options   "nosniff"                           always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
  add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
  # HSTS — 1 year, subdomains, preload list eligible
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # ── Gzip ────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_types application/json application/javascript text/plain text/css;
  gzip_min_length 1024;

  # ── Block common attack paths ───────────────────────────────────────────────
  location ~ /\.(env|git|svn|htaccess|DS_Store) { return 404; }

  # ── Health probes — no rate limit, fast timeout, no access log ─────────────
  # NOTE: /health, /health/live, /health/ready are excluded from the global
  # API prefix in NestJS (main.ts) — they live at the root, NOT /api/v1/health
  location ~ ^/health(/.*)?$ {
    proxy_pass         http://khedmah_api;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 5s;
    access_log         off;
  }

  # ── Auth — tighter rate limit (10 req/min per IP) ─────────────────────────
  location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
    limit_req        zone=api_auth burst=5 nodelay;
    limit_req_status 429;

    proxy_pass         http://khedmah_api;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID      $request_id;
    add_header         X-Request-ID      $request_id always;
    proxy_read_timeout 30s;
    client_max_body_size 1m;
  }

  # ── WebSocket — long-lived connections for Socket.io chat ─────────────────
  location /socket.io/ {
    proxy_pass         http://khedmah_api;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
  }

  # ── REST API (all other routes) ────────────────────────────────────────────
  location /api/ {
    limit_req        zone=api_global burst=20 nodelay;
    limit_req_status 429;

    proxy_pass         http://khedmah_api;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";  # enable keepalive to upstream
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID      $request_id;
    add_header         X-Request-ID      $request_id always;
    proxy_read_timeout 60s;
    client_max_body_size 10m;
  }
}
