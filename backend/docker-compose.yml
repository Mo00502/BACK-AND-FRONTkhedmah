version: '3.9'

# ── Khedmah Backend — Docker Compose ──────────────────────────────────────
# Production:  docker compose up -d
# Development: docker compose --profile dev up
# Tooling:     docker compose --profile tools up pgadmin redis-commander

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     khedmah
      POSTGRES_PASSWORD: secret
      POSTGRES_DB:       khedmah_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U khedmah -d khedmah_db']
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis 7 ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test:     ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout:  5s
      retries:  5

  # ── NestJS API (Production) ────────────────────────────────────────────
  api:
    build:
      context: .
      target:  production
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://khedmah:secret@postgres:5432/khedmah_db?schema=public
      REDIS_HOST:   redis
      REDIS_PORT:   6379
    healthcheck:
      test:         ['CMD-SHELL', 'wget -qO- http://localhost:3000/health/live || exit 1']
      interval:     30s
      timeout:      10s
      start_period: 20s
      retries:      3

  # ── NestJS API (Development — hot reload) ─────────────────────────────
  api_dev:
    build:
      context: .
      target:  builder
    command: npm run start:dev
    restart: unless-stopped
    ports:
      - '3001:3000'
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:     development
      DATABASE_URL: postgresql://khedmah:secret@postgres:5432/khedmah_db?schema=public
      REDIS_HOST:   redis
      REDIS_PORT:   6379
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    profiles:
      - dev

  # ── Prisma migrations runner (one-shot) ───────────────────────────────
  migrate:
    build:
      context: .
      target:  builder
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://khedmah:secret@postgres:5432/khedmah_db?schema=public
    profiles:
      - migrate

  # ── pgAdmin 4 (DB GUI) ─────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@khedmah.sa
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # ── Redis Commander (Redis GUI) ────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    profiles:
      - tools

  # ── Nginx reverse proxy (production) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    profiles:
      - production

volumes:
  pgdata:
  redisdata:
